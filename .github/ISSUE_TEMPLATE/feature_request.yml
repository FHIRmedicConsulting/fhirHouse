name: Feature request
description: Suggest a capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do? What's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: context
    attributes:
      label: FHIR / standards context
      description: Relevant IG, ONC (g)(10), CMS-0057, US Core, etc.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits a self-hostable FHIR server (not a governance/ELT concern handled by a separate app)
