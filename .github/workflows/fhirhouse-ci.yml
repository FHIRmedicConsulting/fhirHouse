name: fhirhouse-ci
on:
  push:
    paths:
      - "warehouse-gov/**"
      - "dbt/**"
      - "dagster/**"
      - "mdm/**"
      - "dq/**"
      - "lineage/**"
      - "contracts/**"
      - "pyproject.toml"
      - ".github/workflows/fhirhouse-ci.yml"
  pull_request:
jobs:
  fhirhouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Contract drift-test (fhirEngine Gold schema)
        run: python contracts/drift_test.py
      - name: Tests
        run: pytest -q
      - name: dbt parse
        run: dbt parse --project-dir dbt --profiles-dir dbt
      - name: Lint
        run: ruff check .
