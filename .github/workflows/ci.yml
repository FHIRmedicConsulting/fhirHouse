name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: packages/server

jobs:
  unit:
    name: typecheck · lint · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci
      - run: npm run typecheck   # self-builds @fhirengine/fhir-types dist first
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run build

  security:
    name: supply-chain (audit · SBOM · pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm run audit
      - name: Install linked workspace deps (for a complete SBOM tree)
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: packages/fhir-types
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: packages/server/sbom.cdx.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (sidecar deps)
        working-directory: packages/server/sidecar
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  scan:
    name: secret + vuln scan (gitleaks · trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning
      - name: gitleaks (secret scan, full history)
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar xz gitleaks
          ./gitleaks detect --source "$GITHUB_WORKSPACE" --no-banner --redact --exit-code 1
      - name: Trivy (deps + IaC/Dockerfile misconfig + secrets)
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.55.0
          trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed "$GITHUB_WORKSPACE"

  integration:
    name: delta integration (sidecar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/server/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Install sidecar deps (+ pytest)
        working-directory: packages/server/sidecar
        run: pip install -r requirements-dev.txt
      - name: Sidecar unit tests (pytest)
        working-directory: packages/server/sidecar
        run: pytest tests/ -q
      - name: Start delta sidecar (fail hard if it never comes up)
        run: |
          python sidecar/delta_sidecar.py --port 8077 --base ./.delta-ci &
          for i in $(seq 1 60); do curl -fsS http://127.0.0.1:8077/health >/dev/null && ok=1 && break; sleep 1; done
          [ "${ok:-}" = 1 ] || { echo "::error::delta sidecar did not become healthy — failing (avoids silently skipped delta tests)"; exit 1; }
      - name: Tests + coverage gate (unit + delta; thresholds in vitest.config)
        env:
          FHIRENGINE_DELTA_SIDECAR_URL: http://127.0.0.1:8077
          FHIRENGINE_DELTA_BASE: ./.delta-ci
        run: npm run test:coverage   # runs unit + delta with coverage; fails below thresholds
      - name: Server boot smoke (real entrypoint, dev profile)
        env:
          FHIRENGINE_DELTA_SIDECAR_URL: http://127.0.0.1:8077
          FHIRENGINE_DELTA_BASE: ./.delta-ci-smoke
        run: |
          npx tsx src/server.ts & SRV=$!
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:3000/ready >/dev/null && ok=1 && break; sleep 1; done
          [ "${ok:-}" = 1 ] || { echo "::error::server did not become ready"; kill $SRV 2>/dev/null; exit 1; }
          curl -fsS http://127.0.0.1:3000/health  | grep -q '"status":"ok"'
          curl -fsS http://127.0.0.1:3000/metadata | grep -q CapabilityStatement
          kill $SRV 2>/dev/null || true
