# fhirEngine — self / cloud-hosted (non-Databricks) deployment.
# Two services on one shared codebase: TS/Hono FHIR server + delta-rs/DataFusion
# storage sidecar (single-writer). Delta lives on a local volume OR an object store.
#
#   Dev/demo (synthetic data):  docker compose up --build      → dev security profile
#   Production (PHI-capable):   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# The base file runs the DEV security profile (controls opt-in/off) for SYNTHETIC data only.
# The prod overlay flips FHIRENGINE_SECURITY_PROFILE=production, which FAILS CLOSED unless auth + audit +
# transport security are configured (ADR-0032). See deploy/README.md + the security runbook
# (docs/standalone/security-hardening-and-deployment.md).
name: fhirengine

services:
  sidecar:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sidecar
    environment:
      FHIRENGINE_DELTA_SIDECAR_PORT: "8077"
      FHIRENGINE_DELTA_BASE: ${FHIRENGINE_DELTA_BASE:-/data/delta}
      # Object-store creds — only needed when FHIRENGINE_DELTA_BASE is s3://, gs://, az://
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      # Single-writer (ADR-0026) on AWS S3 → safe to allow rename without a lock
      # service. R2/MinIO/GCS use native conditional-put and ignore this.
      AWS_S3_ALLOW_UNSAFE_RENAME: ${AWS_S3_ALLOW_UNSAFE_RENAME:-}
      GOOGLE_SERVICE_ACCOUNT: ${GOOGLE_SERVICE_ACCOUNT:-}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-}
    volumes:
      - delta-data:/data/delta   # used in local mode; harmless for object-store mode
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    environment:
      FHIRENGINE_DEPLOY_MODE: self-hosted
      FHIRENGINE_DELTA_SIDECAR_URL: http://sidecar:8077
      # Must match the sidecar's base — the server sends table paths to the sidecar.
      FHIRENGINE_DELTA_BASE: ${FHIRENGINE_DELTA_BASE:-/data/delta}
      PORT: "3000"
      FHIRENGINE_PUBLIC_URL: ${FHIRENGINE_PUBLIC_URL:-http://localhost:3000}
      FHIRENGINE_LOG_LEVEL: ${FHIRENGINE_LOG_LEVEL:-info}
      # Security profile — 'dev' (default, synthetic-only) or 'production' (fail-closed, ADR-0032).
      # The prod overlay sets this + the required controls. See deploy/.env.example for all vars.
      FHIRENGINE_SECURITY_PROFILE: ${FHIRENGINE_SECURITY_PROFILE:-dev}
      FHIRENGINE_AUTH_ENABLED: ${FHIRENGINE_AUTH_ENABLED:-}
      FHIRENGINE_AUTH_STRATEGY: ${FHIRENGINE_AUTH_STRATEGY:-}
      FHIRENGINE_AUDIT_ENABLED: ${FHIRENGINE_AUDIT_ENABLED:-}
      FHIRENGINE_CONSENT_ENFORCEMENT: ${FHIRENGINE_CONSENT_ENFORCEMENT:-}
      FHIRENGINE_TLS_TERMINATED_AT_PROXY: ${FHIRENGINE_TLS_TERMINATED_AT_PROXY:-}
      FHIRENGINE_CORS_ORIGINS: ${FHIRENGINE_CORS_ORIGINS:-}
      FHIRENGINE_RATE_LIMIT_ENABLED: ${FHIRENGINE_RATE_LIMIT_ENABLED:-}
    ports:
      - "${FHIRENGINE_PORT:-3000}:3000"
    depends_on:
      sidecar:
        condition: service_healthy   # don't take traffic until storage is reachable
    restart: unless-stopped

volumes:
  delta-data:
