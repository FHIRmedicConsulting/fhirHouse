# Production overlay — fhirEngine PHI-capable deployment.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Turns on the fail-closed production security profile (ADR-0032): the server REFUSES TO BOOT
# unless authentication + audit + transport security are configured. This overlay sets the gate
# flags; YOU must still supply:
#   - a real IdP/JWKS for FHIRENGINE_AUTH_STRATEGY=jwks (FHIRENGINE_JWKS_URI / OIDC discovery), OR run our
#     OAuth server with STATIC keys (FHIRENGINE_OAUTH_PRIVATE_KEY/PUBLIC_KEY),
#   - TLS: either terminate at a proxy/LB in front of this service (default here), or set
#     FHIRENGINE_TLS_CERT/KEY on the server for in-process HTTPS,
#   - CORS origins for your real client apps.
# See docs/standalone/security-hardening-and-deployment.md §2. Provide secrets via your orchestrator
# / 1Password `op run` — never commit them.
services:
  server:
    environment:
      FHIRENGINE_SECURITY_PROFILE: production
      FHIRENGINE_AUTH_ENABLED: "true"
      FHIRENGINE_AUTH_STRATEGY: ${FHIRENGINE_AUTH_STRATEGY:-jwks}
      FHIRENGINE_AUDIT_ENABLED: "true"
      FHIRENGINE_CONSENT_ENFORCEMENT: ${FHIRENGINE_CONSENT_ENFORCEMENT:-true}
      # TLS terminated at an upstream proxy/LB by default. To run in-process HTTPS instead,
      # unset this and set FHIRENGINE_TLS_CERT/KEY (mounted PEM paths).
      FHIRENGINE_TLS_TERMINATED_AT_PROXY: ${FHIRENGINE_TLS_TERMINATED_AT_PROXY:-true}
      FHIRENGINE_RATE_LIMIT_ENABLED: "true"
      FHIRENGINE_RATE_LIMIT_RPM: ${FHIRENGINE_RATE_LIMIT_RPM:-600}
      FHIRENGINE_CORS_ORIGINS: ${FHIRENGINE_CORS_ORIGINS:-}
      # IdP / OAuth signing keys (supply via secrets):
      FHIRENGINE_JWKS_URI: ${FHIRENGINE_JWKS_URI:-}
      FHIRENGINE_OAUTH_ENABLED: ${FHIRENGINE_OAUTH_ENABLED:-}
      FHIRENGINE_OAUTH_PRIVATE_KEY: ${FHIRENGINE_OAUTH_PRIVATE_KEY:-}
      FHIRENGINE_OAUTH_PUBLIC_KEY: ${FHIRENGINE_OAUTH_PUBLIC_KEY:-}
